name: flutter_ai_demo
description: Flutter AI Teaching Demo App
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  http: ^1.2.0
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.18
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  url_launcher: ^6.2.2
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  animated_text_kit: ^4.2.2
  lottie: ^3.0.0
  fl_chart: ^0.66.0
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_face_detection: ^0.13.2
  google_mlkit_barcode_scanning: ^0.14.2
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_object_detection: ^0.15.1
  camera: ^0.11.4
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
